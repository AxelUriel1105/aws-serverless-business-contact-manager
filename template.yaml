AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Phone Book App

Globals:
  Function:
    Runtime: python3.9
    Environment:
      Variables:
        TABLE_NAME: PhoneBook-AxelAparicio

Resources:
  PhoneBookTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: PhoneBook-AxelAparicio
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: email-index
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL
            
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: PhoneBook-UserPool-AxelAparicio
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: PhoneBook-Client-AxelAparicio
      UserPoolId: !Ref CognitoUserPool
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      GenerateSecret: false

  PhoneBookApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: v1
      Tags:
        protect: waf
      Cors:
        AllowMethods: "'*'"
        AllowHeaders: "'*'"
        AllowOrigin: "'*'"
      Auth:
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt CognitoUserPool.Arn
        DefaultAuthorizer: CognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false

  InsertContactFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/insert_contact/
      Handler: insert_contact.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: PhoneBook-AxelAparicio
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref PhoneBookApi
            Path: /contacts
            Method: POST

  GetContactsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/get_contacts/
      Handler: get_contacts.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: PhoneBook-AxelAparicio
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref PhoneBookApi
            Path: /contacts
            Method: GET

  GetContactFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/get_contact/
      Handler: get_contact.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: PhoneBook-AxelAparicio
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref PhoneBookApi
            Path: /contacts/{userId}
            Method: GET

  UpdateContactFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/update_contact/
      Handler: update_contact.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: PhoneBook-AxelAparicio
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref PhoneBookApi
            Path: /contacts/{userId}
            Method: PUT

  DeleteContactFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/delete_contact/
      Handler: delete_contact.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: PhoneBook-AxelAparicio
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref PhoneBookApi
            Path: /contacts/{userId}
            Method: DELETE

  UploadCsvFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/upload_csv/
      Handler: upload_csv.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: PhoneBook-AxelAparicio
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref PhoneBookApi
            Path: /contacts/upload
            Method: POST

  CsvBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: phone-book-csv-axel-aparicio
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true

  ChunkCalculatorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/csv_coordinator/
      Handler: csv_coordinator.lambda_handler
      Timeout: 60
      MemorySize: 256
      Policies:
        - S3ReadPolicy:
            BucketName: phone-book-csv-axel-aparicio

  CsvProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/csv_processor/
      Handler: csv_processor.lambda_handler
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          TABLE_NAME: PhoneBook-AxelAparicio
      Policies:
        - DynamoDBCrudPolicy:
            TableName: PhoneBook-AxelAparicio
        - S3ReadPolicy:
            BucketName: phone-book-csv-axel-aparicio

  CsvStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: CsvStateMachine-AxelAparicio
      Definition:
        StartAt: CalculateChunks
        States:
          CalculateChunks:
            Type: Task
            Resource: !GetAtt ChunkCalculatorFunction.Arn
            Next: ProcessChunks
          ProcessChunks:
            Type: Map
            ItemsPath: $.chunks
            MaxConcurrency: 10
            Iterator:
              StartAt: ProcessChunk
              States:
                ProcessChunk:
                  Type: Task
                  Resource: !GetAtt CsvProcessorFunction.Arn
                  End: true
            End: true
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref ChunkCalculatorFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref CsvProcessorFunction
      Events:
        S3EventBridgeTrigger:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - aws.s3
              detail-type:
                - Object Created
              detail:
                bucket:
                  name:
                    - phone-book-csv-axel-aparicio
                object:
                  key:
                    - suffix: .csv

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: phone-book-axel-aparicio

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: phone-book-axel-aparicio-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        DefaultRootObject: index.html
        Enabled: true
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          AllowedMethods:
            - GET
            - HEAD

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::phone-book-axel-aparicio/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

Outputs:
  ApiUrl:
    Description: URL de la API
    Value: !Sub "https://${PhoneBookApi}.execute-api.${AWS::Region}.amazonaws.com/v1"

  FrontendUrl:
    Description: URL del frontend
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"

  UserPoolId:
    Description: ID del User Pool de Cognito
    Value: !Ref CognitoUserPool

  UserPoolClientId:
    Description: ID del App Client de Cognito
    Value: !Ref CognitoUserPoolClient

  CsvBucketName:
    Description: Bucket para subir CSVs
    Value: !Ref CsvBucket